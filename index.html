<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3c-quiz-admin · Dark Purple Edition</title>

  <!-- Styles — Google Fonts loaded via @import inside admin.css -->
  <link rel="stylesheet" href="admin.css">

  <!-- Supabase JS client (must load before admin_app.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body dir="ltr">

  <!-- Main application container — rendered entirely by admin_app.js -->
  <div id="app" dir="ltr"></div>

  <!-- Fatal error fallback — only shown if JS fails to mount -->
  <div id="fatal-error" style="display:none;color:#f87171;font-size:1.2em;margin:32px;font-family:sans-serif;"></div>

  <script>
    // Defensive check before app loads
    if (!document.getElementById('app')) {
      const el = document.getElementById('fatal-error');
      el.innerText = 'Fatal Error: #app container not found.';
      el.style.display = 'block';
      throw new Error('Fatal Error: #app container not found.');
    }

    // Enforce LTR globally — counteracts any browser/OS RTL auto-detection
    document.documentElement.setAttribute('dir', 'ltr');
    document.body.setAttribute('dir', 'ltr');

    // Keep all inputs LTR on keydown and input events.
    // Only enforce direction — NOT textAlign, so center-aligned blocks work correctly.
    function enforceLTR(e) {
      const t = e.target;
      if (t.contentEditable === 'true' || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') {
        t.style.direction   = 'ltr';
        t.style.unicodeBidi = 'normal';
      }
    }
    document.addEventListener('keydown', enforceLTR);
    document.addEventListener('input',   enforceLTR);
  </script>

  <!-- Admin app — single load, at end of body -->
  <script src="admin.app.js"></script>

</body>
</html>
